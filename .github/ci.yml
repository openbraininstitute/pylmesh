name: CI - pylmesh

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy pytest pytest-cov trimesh

      - name: Install package
        run: |
          pip install .

      - name: Run all unit tests
        run: |
          python -m pytest pytests/ -v --cov=pylmesh --cov-report=xml

      # Build + publish + GitHub Release ONLY when pushing a version tag vX.Y.Z
      - name: Install build and twine
        if: startsWith(github.ref, 'refs/tags/v')
        run: pip install build twine

      - name: Build Python wheel
        if: startsWith(github.ref, 'refs/tags/v')
        run: python -m build

      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::985539765147:role/gh_codeartifact_pypi-prod_pylmesh
          aws-region: us-east-1

      - name: Get CodeArtifact token
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          export CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain openbraininstitute \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=$CODEARTIFACT_AUTH_TOKEN" >> $GITHUB_ENV

      - name: Publish to CodeArtifact
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          twine upload --repository-url https://openbraininstitute-${ACCOUNT_ID}.d.codeartifact.us-east-1.amazonaws.com/pypi/pypi-prod/ \
            --username aws \
            --password $CODEARTIFACT_AUTH_TOKEN \
            dist/*

      - name: Upload wheel to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
