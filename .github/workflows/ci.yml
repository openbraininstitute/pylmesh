name: CI - pylmesh

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - "v*"

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            typing_extensions \
            scikit-build-core \
            nanobind \
            numpy \
            pytest \
            pytest-cov \
            trimesh

      - name: Cache C++ dependencies
        id: cache-cpp-deps
        uses: actions/cache@v4
        with:
          path: /usr/local
          key: cpp-deps-linux-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build C++ dependencies from source
        if: steps.cache-cpp-deps.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          cd /tmp

          git clone --depth 1 https://github.com/g-truc/glm.git
          sudo cp -r glm/glm /usr/local/include/
          rm -rf glm

          git clone --depth 1 https://github.com/nlohmann/json.git
          cd json
          cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DJSON_BuildTests=OFF .
          sudo cmake --install .
          cd /tmp
          rm -rf json

          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/usr-local.conf
          sudo ldconfig

      - name: Configure CMake
        run: |
          set -euxo pipefail
          NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")

          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="/usr/local;${NANOBIND_CMAKE_DIR}" \
            -DPython_EXECUTABLE="$(which python)"

      - name: Build project
        run: cmake --build build --parallel "$(nproc)"

      - name: Run unit tests
        run: cmake --build build --target unit_tests --parallel "$(nproc)"

  build-wheels:
    name: Build wheels (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            git \
            pkg-config \
            libtiff-dev \
            libhdf5-dev \
            libeigen3-dev \
            zlib1g-dev \
            libbz2-dev \
            libboost-all-dev \
            python3-dev

      - name: Build C++ dependencies from source
        run: |
          set -euxo pipefail
          cd /tmp

          git clone --depth 1 https://github.com/g-truc/glm.git
          sudo cp -r glm/glm /usr/local/include/
          rm -rf glm

          git clone --depth 1 https://github.com/nlohmann/json.git
          cd json
          cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DJSON_BuildTests=OFF .
          sudo cmake --install .
          cd /tmp
          rm -rf json

          echo "/usr/local/lib" | sudo tee /etc/ld.so.conf.d/usr-local.conf
          sudo ldconfig

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_BUILD: |
            pip install --upgrade pip
            pip install nanobind scikit-build-core typing_extensions
            NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
            echo "set(CMAKE_PREFIX_PATH \"/usr/local;${NANOBIND_CMAKE_DIR}\" CACHE STRING \"\" FORCE)" > /tmp/nanobind_prefix.cmake
          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH="/usr/local"
            SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/tmp/nanobind_prefix.cmake"
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-linux
          path: wheelhouse/*.whl

      - name: Build sdist and wheel
        if: startsWith(github.ref, 'refs/tags/v')
        run: python -m build

      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::985539765147:role/gh_codeartifact_pypi-prod_pylmesh
          aws-region: us-east-1

      - name: Get CodeArtifact token
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain openbraininstitute \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=${CODEARTIFACT_AUTH_TOKEN}" >> "${GITHUB_ENV}"

      - name: Publish to CodeArtifact
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          twine upload \
            --repository-url "https://openbraininstitute-${ACCOUNT_ID}.d.codeartifact.us-east-1.amazonaws.com/pypi/pypi-prod/" \
            --username aws \
            --password "${CODEARTIFACT_AUTH_TOKEN}" \
            dist/*

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true