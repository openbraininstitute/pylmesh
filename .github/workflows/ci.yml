name: CI - pylmesh

# Trigger the workflow on:
#   - Pull requests targeting main or master (for CI validation)
#   - Pushes to main or master (for post-merge validation)
#   - Version tags (v*) to trigger the full release pipeline
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - "v*"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git pkg-config libhdf5-dev libomp-dev g++

      - name: Install Python package
        run: pip install .

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests -v

  build-wheels-linux:
    name: Build wheels (Linux)
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Build wheels (cibuildwheel)
      #    Runs inside a manylinux_2_28 container (Fedora/RHEL-based).
      # ------------------------------------------------------------------ #
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"

          CIBW_BEFORE_ALL: |
            set -euxo pipefail

            dnf install -y epel-release
            dnf install -y hdf5-devel libomp-devel

            cd /tmp
            git clone --depth 1 https://github.com/g-truc/glm.git
            cp -r glm/glm /usr/local/include/
            rm -rf glm

            git clone --depth 1 https://github.com/nlohmann/json.git
            cd json
            cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DJSON_BuildTests=OFF .
            cmake --install .
            cd /tmp && rm -rf json

            git clone --depth 1 --branch 1.5.7 https://github.com/google/draco.git
            cd draco
            mkdir build && cd build
            cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DDRACO_TESTS=OFF ..
            cmake --build . --config Release -j$(nproc)
            cmake --install .
            cd /tmp && rm -rf draco

            ldconfig

          CIBW_BEFORE_BUILD: |
            pip install --upgrade pip
            pip install nanobind scikit-build-core typing_extensions
            NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
            echo "set(CMAKE_PREFIX_PATH \"/usr/local;${NANOBIND_CMAKE_DIR}\" CACHE STRING \"\" FORCE)" > /tmp/nanobind_prefix.cmake

          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH="/usr/local"
            SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/tmp/nanobind_prefix.cmake"

          CIBW_BUILD_VERBOSITY: 1

      # ------------------------------------------------------------------ #
      # 3. Upload wheels artifact
      # ------------------------------------------------------------------ #
      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-linux
          path: wheelhouse/*.whl

  build-wheels-macos:
    name: Build wheels (macOS)
    runs-on: macos-latest

    permissions:
      contents: write
      id-token: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Compute macOS deployment target
      #    Runs on the GitHub Actions runner before cibuildwheel starts.
      #    Exports MACOSX_DEPLOYMENT_TARGET into $GITHUB_ENV so it is
      #    available as a plain env var in subsequent steps — avoiding any
      #    $() subshell in CIBW_ENVIRONMENT which bashlex cannot parse.
      # ------------------------------------------------------------------ #
      - name: Set macOS deployment target
        run: |
          OS_VER=$(sw_vers -productVersion)
          MAJOR=$(echo "$OS_VER" | cut -d. -f1)
          MINOR=$(echo "$OS_VER" | cut -d. -f2)
          echo "MACOSX_DEPLOYMENT_TARGET=${MAJOR}.${MINOR}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------------ #
      # 3. Build wheels (cibuildwheel)
      #    Runs natively on the macOS runner (Apple Silicon / arm64).
      #    Dependencies are installed into ~/.local to avoid needing sudo.
      # ------------------------------------------------------------------ #
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: "cp312-macosx_arm64"
          CIBW_SKIP: ""

          CIBW_BEFORE_ALL: |
            set -euxo pipefail

            # GLM — header-only
            cd /tmp
            rm -rf glm
            git clone --depth 1 https://github.com/g-truc/glm.git
            mkdir -p ~/.local/include
            cp -r glm/glm ~/.local/include/
            rm -rf glm

            # nlohmann/json — header-only, installed via CMake
            rm -rf json
            git clone --depth 1 https://github.com/nlohmann/json.git
            cd json
            CC=clang CXX=clang++ cmake -DCMAKE_INSTALL_PREFIX=~/.local -DJSON_BuildTests=OFF .
            cmake --install .
            cd /tmp && rm -rf json

            # Draco — static build, install libs and headers manually
            rm -rf draco
            git clone --depth 1 --branch 1.5.7 https://github.com/google/draco.git
            cd draco
            mkdir build && cd build
            CC=clang CXX=clang++ cmake \
              -DCMAKE_INSTALL_PREFIX=~/.local \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
              ..
            cmake --build . --config Release --target draco -j$(sysctl -n hw.ncpu)
            mkdir -p ~/.local/lib
            find . -name '*.a' -exec cp {} ~/.local/lib/ \;
            cp -r ../src/draco ~/.local/include/
            cd /tmp && rm -rf draco

          CIBW_BEFORE_BUILD: |
            pip install --upgrade pip
            pip install nanobind scikit-build-core typing_extensions
            NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
            echo "set(CMAKE_PREFIX_PATH \"$HOME/.local;${NANOBIND_CMAKE_DIR}\" CACHE STRING \"\" FORCE)" > /tmp/nanobind_prefix.cmake

          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH="~/.local"
            MACOSX_DEPLOYMENT_TARGET="$MACOSX_DEPLOYMENT_TARGET"
            SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/tmp/nanobind_prefix.cmake"

          CIBW_BUILD_VERBOSITY: 1

      # ------------------------------------------------------------------ #
      # 3. Upload wheels artifact
      # ------------------------------------------------------------------ #
      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-macos
          path: wheelhouse/*.whl

  publish:
    name: Publish to PyPI and GitHub Release
    runs-on: ubuntu-latest
    # Only run on version tags, and only after both wheel builds succeed
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels-linux, build-wheels-macos]

    permissions:
      contents: write
      id-token: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout (needed to build the sdist)
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set up Python
      # ------------------------------------------------------------------ #
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------ #
      # 3. Install build tools
      # ------------------------------------------------------------------ #
      - name: Install build tools
        run: pip install build

      # ------------------------------------------------------------------ #
      # 4. Download all wheels built by both platform jobs
      # ------------------------------------------------------------------ #
      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: cibw-wheels-linux
          path: dist/

      - name: Download macOS wheels
        uses: actions/download-artifact@v4
        with:
          name: cibw-wheels-macos
          path: dist/

      # ------------------------------------------------------------------ #
      # 5. Build sdist and place alongside wheels
      # ------------------------------------------------------------------ #
      - name: Build sdist
        run: |
          python -m build --sdist --outdir dist/

      # ------------------------------------------------------------------ #
      # 6. Publish to PyPI (Trusted Publisher / OIDC)
      # ------------------------------------------------------------------ #
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ------------------------------------------------------------------ #
      # 7. Create GitHub Release and attach all dist artifacts
      # ------------------------------------------------------------------ #
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true