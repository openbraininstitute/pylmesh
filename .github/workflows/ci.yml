name: CI - pylmesh

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - "v*"

jobs:
  build-wheels:
    name: Build wheels (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_SKIP: "*musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_ALL: |
            set -euxo pipefail

            # HDF5 via EPEL (manylinux_2_28 is Fedora/RHEL-based)
            dnf install -y epel-release
            dnf install -y hdf5-devel

            # GLM (header-only)
            cd /tmp
            git clone --depth 1 https://github.com/g-truc/glm.git
            cp -r glm/glm /usr/local/include/
            rm -rf glm

            # nlohmann/json
            git clone --depth 1 https://github.com/nlohmann/json.git
            cd json
            cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DJSON_BuildTests=OFF .
            cmake --install .
            cd /tmp && rm -rf json

            ldconfig
          CIBW_BEFORE_BUILD: |
            pip install --upgrade pip
            pip install nanobind scikit-build-core typing_extensions
            NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
            echo "set(CMAKE_PREFIX_PATH \"/usr/local;${NANOBIND_CMAKE_DIR}\" CACHE STRING \"\" FORCE)" > /tmp/nanobind_prefix.cmake
          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH="/usr/local"
            SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/tmp/nanobind_prefix.cmake"
          CIBW_BUILD_VERBOSITY: 1

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-linux
          path: wheelhouse/*.whl

      - name: Set up Python
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: pip install build twine

      - name: Build sdist and wheel
        if: startsWith(github.ref, 'refs/tags/v')
        run: python -m build

      - name: Configure AWS credentials
        if: startsWith(github.ref, 'refs/tags/v')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::985539765147:role/gh_codeartifact_pypi-prod_pylmesh
          aws-region: us-east-1

      - name: Get CodeArtifact token
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          CODEARTIFACT_AUTH_TOKEN=$(aws codeartifact get-authorization-token \
            --domain openbraininstitute \
            --query authorizationToken \
            --output text)
          echo "CODEARTIFACT_AUTH_TOKEN=${CODEARTIFACT_AUTH_TOKEN}" >> "${GITHUB_ENV}"

      - name: Publish to CodeArtifact
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          twine upload \
            --repository-url "https://openbraininstitute-${ACCOUNT_ID}.d.codeartifact.us-east-1.amazonaws.com/pypi/pypi-prod/" \
            --username aws \
            --password "${CODEARTIFACT_AUTH_TOKEN}" \
            dist/*

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
