name: CI - pylmesh

# Trigger the workflow on:
#   - Pull requests targeting main or master (for CI validation)
#   - Pushes to main or master (for post-merge validation)
#   - Version tags (v*) to trigger the full release pipeline
on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags:
      - "v*"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git pkg-config libhdf5-dev libomp-dev g++

      - name: Install Python package
        run: pip install .

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests -v

  build-wheels:
    name: Build wheels (Linux)
    runs-on: ubuntu-latest

    permissions:
      # Needed by softprops/action-gh-release to create releases and upload assets
      contents: write
      # Needed for PyPI Trusted Publisher (OIDC)
      id-token: write

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      #    Clones the repository into the runner workspace, including
      #    submodules (e.g. tinygltf, draco) if any are configured.
      # ------------------------------------------------------------------ #
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Build wheels (cibuildwheel)
      #    Runs inside a manylinux_2_28 container (Fedora/RHEL-based).
      #    Produces a PEP 600-compliant manylinux wheel for cp312/x86_64.
      #
      #    CIBW_BEFORE_ALL   — runs once per container; installs C++ deps.
      #    CIBW_BEFORE_BUILD — runs once per Python version; installs Python
      #                        build deps and generates the CMake toolchain.
      #    CIBW_ENVIRONMENT  — exposes variables to the CMake build inside
      #                        the container.
      #    Output lands in ./wheelhouse/ on the Ubuntu host.
      # ------------------------------------------------------------------ #
      - name: Build wheels
        uses: pypa/cibuildwheel@v2.16.5
        env:
          # Only build for CPython 3.12 on Linux x86_64
          CIBW_BUILD: "cp312-manylinux_x86_64"
          # Skip musl-based builds (Alpine); we only target glibc
          CIBW_SKIP: "*musllinux*"
          # Use the manylinux 2.28 image (based on AlmaLinux 8 / glibc 2.28)
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"

          # Runs once inside the container before any wheel is built.
          # Installs all C++ system-level dependencies that the extension needs.
          CIBW_BEFORE_ALL: |
            set -euxo pipefail

            # HDF5 is not in the default manylinux repos; enable EPEL first
            dnf install -y epel-release
            dnf install -y hdf5-devel libomp-devel

            # GLM is header-only; copy directly into the system include path
            cd /tmp
            git clone --depth 1 https://github.com/g-truc/glm.git
            cp -r glm/glm /usr/local/include/
            rm -rf glm

            # nlohmann/json — header-only but distributed via CMake install
            git clone --depth 1 https://github.com/nlohmann/json.git
            cd json
            cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DJSON_BuildTests=OFF .
            cmake --install .
            cd /tmp && rm -rf json

            # Draco — build and install for GLB compression support
            git clone --depth 1 --branch 1.5.7 https://github.com/google/draco.git
            cd draco
            mkdir build && cd build
            cmake -DCMAKE_INSTALL_PREFIX=/usr/local -DBUILD_SHARED_LIBS=OFF -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DDRACO_TESTS=OFF ..
            cmake --build . --config Release -j$(nproc)
            cmake --install .
            cd /tmp && rm -rf draco

            # Refresh the dynamic linker cache after installing to /usr/local
            ldconfig

          # Runs once per Python version before the wheel build.
          # Installs Python-level build tools and generates a CMake toolchain
          # file that points CMake at nanobind's cmake directory.
          CIBW_BEFORE_BUILD: |
            pip install --upgrade pip
            pip install nanobind scikit-build-core typing_extensions
            NANOBIND_CMAKE_DIR=$(python -c "import nanobind; print(nanobind.cmake_dir())")
            echo "set(CMAKE_PREFIX_PATH \"/usr/local;${NANOBIND_CMAKE_DIR}\" CACHE STRING \"\" FORCE)" > /tmp/nanobind_prefix.cmake

          # Environment variables forwarded into the CMake build.
          # CMAKE_PREFIX_PATH tells CMake where to find installed packages.
          # SKBUILD_CMAKE_ARGS injects our toolchain file so nanobind is found.
          CIBW_ENVIRONMENT: >
            CMAKE_PREFIX_PATH="/usr/local"
            SKBUILD_CMAKE_ARGS="-DCMAKE_TOOLCHAIN_FILE=/tmp/nanobind_prefix.cmake"

          # Print full compiler and CMake output for easier debugging
          CIBW_BUILD_VERBOSITY: 1

      # ------------------------------------------------------------------ #
      # 3. Upload wheels artifact
      #    Saves the built wheel(s) from ./wheelhouse/ as a GitHub Actions
      #    artifact. Available for download from the Actions run page,
      #    and used by subsequent steps in tag-triggered runs.
      # ------------------------------------------------------------------ #
      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-linux
          path: wheelhouse/*.whl

      # ------------------------------------------------------------------ #
      # 4. Set up Python (release only)
      #    Installs a known Python version on the Ubuntu host runner.
      #    Only runs on version tags to avoid unnecessary work on PRs/pushes.
      # ------------------------------------------------------------------ #
      - name: Set up Python
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ------------------------------------------------------------------ #
      # 5. Install build tools (release only)
      #    Installs the `build` frontend used to produce the sdist.
      # ------------------------------------------------------------------ #
      - name: Install build tools
        if: startsWith(github.ref, 'refs/tags/v')
        run: pip install build

      # ------------------------------------------------------------------ #
      # 6. Build sdist and collect artifacts (release only)
      #    Produces a source distribution (.tar.gz) from the repo.
      #    Copies the manylinux wheel alongside it so both are published
      #    to PyPI and attached to the GitHub release in a single dist/ dir.
      # ------------------------------------------------------------------ #
      - name: Build sdist and collect artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python -m build --sdist
          cp wheelhouse/*.whl dist/

      # ------------------------------------------------------------------ #
      # 7. Publish to PyPI (release only)
      #    Uploads everything in dist/ (sdist + wheel) to PyPI using the
      #    official PyPA publish action.
      #    Requires a PYPI_API_TOKEN secret set in the repository settings:
      #    Settings → Secrets and variables → Actions → New repository secret
      # ------------------------------------------------------------------ #
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

      # ------------------------------------------------------------------ #
      # 8. Upload release assets (release only)
      #    Creates (or updates) a GitHub Release for the tag and attaches
      #    the sdist and wheel as downloadable release assets.
      #    Auto-generates release notes from merged PRs since the last tag.
      # ------------------------------------------------------------------ #
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true