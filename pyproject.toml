[build-system]
requires = ["scikit-build-core", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "pylmesh"
version = "1.0.0"
description = "A lightweight library for loading 3D mesh files in multiple formats"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "Your Name", email = "your.email@example.com"}
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: C++",
]
keywords = ["mesh", "3d", "obj", "stl", "ply", "off", "gltf", "glb", "loader"]

[project.urls]
Homepage = "https://github.com/yourusername/pylmesh"
Repository = "https://github.com/yourusername/pylmesh"

[tool.scikit-build]
cmake.source-dir = "."
wheel.install-dir = "pylmesh"
install.components = ["python"]
cmake.args = ["-DENABLE_GLTF=ON"]
